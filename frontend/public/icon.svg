<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0a0a0a; }
      .foreground { fill: #fafafa; }
      .accent { fill: none; stroke: #a3a3a3; stroke-width: 1px; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #fafafa; }
      .foreground { fill: #0a0a0a; }
      .accent { fill: none; stroke: #525252; stroke-width: 1px; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="36" />
  <g transform="translate(90 90)">
    <!-- Vinyl disc outer ring -->
    <circle class="foreground" cx="0" cy="0" r="70" />
    <!-- Vinyl grooves -->
    <circle class="accent" cx="0" cy="0" r="58" stroke-width="1" opacity="0.5" />
    <circle class="accent" cx="0" cy="0" r="48" stroke-width="0.75" opacity="0.35" />
    <circle class="accent" cx="0" cy="0" r="38" stroke-width="0.5" opacity="0.25" />
    <!-- Center label -->
    <circle class="background" cx="0" cy="0" r="22" />
    <!-- Center spindle hole -->
    <circle class="foreground" cx="0" cy="0" r="8" />
  </g>
</svg>
