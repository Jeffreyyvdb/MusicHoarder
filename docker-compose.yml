services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: musichoarder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: musichoarderdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musichoarder -d musichoarderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  musichoarder:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5050:8080"
    volumes:
      - ${MUSIC_SOURCE_PATH}:/music/source:ro
      - ${MUSIC_DESTINATION_PATH}:/music/destination
      # Persist DataProtection keys across container restarts so existing session cookies stay
      # valid. Without this, every redeploy logs everyone out.
      - musichoarder-dpkeys:/data/dpkeys
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__musichoarderdb=Host=postgres;Database=musichoarderdb;Username=musichoarder;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - MusicEnricher__SourceDirectory=/music/source
      - MusicEnricher__DestinationDirectory=/music/destination
      - MusicEnricher__AcoustIdApiKey=${ACOUSTID_API_KEY:-}
      - Spotify__ClientId=${SPOTIFY_CLIENT_ID:-}
      - Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET:-}
      # Spotify redirects the browser back through the public frontend origin (the
      # /api/spotify/callback SvelteKit route forwards to the API). Without this the redirect URI
      # is derived from the proxied request host and resolves to a loopback address. Register
      # <PUBLIC_BASE_URL>/api/spotify/callback in the Spotify dashboard.
      - Spotify__OAuthRedirectBaseUrl=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      - Auth__OwnerEmail=${OWNER_EMAIL:?OWNER_EMAIL is required}
      - Auth__DemoUserEmail=${DEMO_USER_EMAIL:-demo@musichoarder.local}
      - Auth__DataProtectionKeysPath=/data/dpkeys
      - Resend__ApiKey=${RESEND_API_KEY:-}
      - Resend__FromAddress=${RESEND_FROM_ADDRESS:-noreply@musichoarder.local}
      - Frontend__PublicBaseUrl=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MUSICHOARDER_API_URL=http://musichoarder:8080
      # Umami analytics (loaded directly from the Umami host — no /stats proxy).
      # Read at runtime via $env/dynamic/public, so changing these is an env change, no rebuild.
      # Set PUBLIC_UMAMI_SRC to https://<umami-host>/script.js and leave PUBLIC_UMAMI_HOST_URL
      # blank so the tracker posts events to the script's own origin (the Umami host).
      - PUBLIC_UMAMI_SRC=${PUBLIC_UMAMI_SRC:-}
      - PUBLIC_UMAMI_WEBSITE_ID=${PUBLIC_UMAMI_WEBSITE_ID:-}
      - PUBLIC_UMAMI_HOST_URL=${PUBLIC_UMAMI_HOST_URL:-}
      - PUBLIC_UMAMI_RECORDER_SRC=${PUBLIC_UMAMI_RECORDER_SRC:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      musichoarder:
        condition: service_healthy

volumes:
  postgres-data:
  musichoarder-dpkeys:
