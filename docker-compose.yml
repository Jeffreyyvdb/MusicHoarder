services:
  postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "postgres-data"
        read_only: false
    networks:
      - "aspire"
    restart: "always"
  api:
    image: "ghcr.io/jeffreyyvdb/musichoarder/api:${MUSICHOARDER_VERSION:-latest}"
    pull_policy: "always"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__musichoarderdb: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=musichoarderdb"
      MUSICHOARDERDB_HOST: "postgres"
      MUSICHOARDERDB_PORT: "5432"
      MUSICHOARDERDB_USERNAME: "postgres"
      MUSICHOARDERDB_PASSWORD: "${POSTGRES_PASSWORD}"
      MUSICHOARDERDB_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/musichoarderdb"
      MUSICHOARDERDB_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/musichoarderdb"
      MUSICHOARDERDB_DATABASENAME: "musichoarderdb"
      MusicEnricher__SourceDirectory: "/music/source"
      MusicEnricher__DestinationDirectory: "/music/destination"
      MusicEnricher__AcoustIdApiKey: "${ACOUSTID_API_KEY}"
      Spotify__ClientId: "${SPOTIFY_CLIENT_ID}"
      Spotify__ClientSecret: "${SPOTIFY_CLIENT_SECRET}"
      Spotify__OAuthRedirectBaseUrl: "${PUBLIC_BASE_URL}"
      Auth__OwnerEmail: "${OWNER_EMAIL:?OWNER_EMAIL is required}"
      Auth__DemoUserEmail: "${DEMO_USER_EMAIL:-demo@musichoarder.local}"
      Auth__DataProtectionKeysPath: "/data/dpkeys"
      Resend__ApiKey: "${RESEND_API_KEY}"
      Resend__FromAddress: "${RESEND_FROM_ADDRESS:-noreply@musichoarder.local}"
      QualityGrading__ApiKey: "${QUALITY_GRADING_API_KEY}"
      QualityGrading__BaseUrl: "${QUALITY_GRADING_BASE_URL:-https://openrouter.ai/api/v1}"
      QualityGrading__Model: "${QUALITY_GRADING_MODEL:-deepseek/deepseek-v4-flash}"
      LyricsTranscription__ApiKey: "${LYRICS_TRANSCRIPTION_API_KEY}"
      LyricsTranscription__BaseUrl: "${LYRICS_TRANSCRIPTION_BASE_URL:-https://api.groq.com/openai/v1}"
      LyricsTranscription__Model: "${LYRICS_TRANSCRIPTION_MODEL:-whisper-large-v3}"
      LyricsTranscription__LlmModel: "${LYRICS_TRANSCRIPTION_LLM_MODEL:-google/gemini-2.5-flash-lite}"
      Slskd__BaseUrl: "${SLSKD_URL:-}"
      Slskd__ApiKey: "${SLSKD_API_KEY:-}"
      Slskd__DownloadsDirectory: "${SLSKD_DOWNLOADS_DIR:-/data/slskd-downloads}"
      StreamingFlac__SidecarUrl: "${SPOTIFLAC_SIDECAR_URL:-}"
      Frontend__PublicBaseUrl: "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}"
      MusicEnricher__EnableWishlistDownloads: "${ENABLE_WISHLIST_DOWNLOADS:-false}"
      MusicEnricher__AutoDownloadWishlist: "${AUTO_DOWNLOAD_WISHLIST:-false}"
      MusicEnricher__DownloadDirectory: "/data/downloads"
      MusicEnricher__YtDlpCookiesPath: "${YTDLP_COOKIES_PATH:-}"
      MusicEnricher__YtDlpExtraArgs: "${YTDLP_EXTRA_ARGS:-}"
      MusicEnricher__DownloadProviders__0: "${DOWNLOAD_PROVIDER_1:-slskd}"
      MusicEnricher__DownloadProviders__1: "${DOWNLOAD_PROVIDER_2:-yt-dlp}"
      MusicEnricher__DownloadProviders__2: "${DOWNLOAD_PROVIDER_3:-}"
      Sync__Mode: "${SYNC_MODE:-Off}"
      Sync__ApiKey: "${SYNC_API_KEY:-}"
      Sync__RemoteBaseUrl: "${SYNC_REMOTE_URL:-}"
      Sync__SyncedSourceDirectory: "${SYNC_SOURCE_DIR:-/data/synced-source}"
      Navidrome__BaseUrl: "${NAVIDROME_URL:-}"
      Navidrome__Username: "${NAVIDROME_USERNAME:-}"
      Navidrome__Password: "${NAVIDROME_PASSWORD:-}"
    ports:
      - "5050:8080"
    volumes:
      - type: "volume"
        target: "/data/dpkeys"
        source: "musichoarder-dpkeys"
      - type: "volume"
        target: "/data/downloads"
        source: "musichoarder-downloads"
      - type: "bind"
        target: "/data/cookies/youtube.txt"
        source: "${YTDLP_COOKIES_HOST_PATH:-/dev/null}"
        read_only: true
      - type: "volume"
        target: "/data/synced-source"
        source: "musichoarder-synced-source"
      - type: "bind"
        target: "/music/source"
        source: "${MUSIC_SOURCE_PATH}"
        read_only: true
      - type: "bind"
        target: "/music/destination"
        source: "${MUSIC_DESTINATION_PATH}"
      - type: "bind"
        target: "/data/slskd-downloads"
        source: "${SLSKD_DOWNLOADS_HOST_PATH:-/dev/null}"
    networks:
      - "aspire"
    restart: "always"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://localhost:8080/alive || exit 1"
      interval: "10s"
      timeout: "5s"
      retries: 6
      start_period: "40s"
  frontend:
    image: "ghcr.io/jeffreyyvdb/musichoarder/frontend:${MUSICHOARDER_VERSION:-latest}"
    pull_policy: "always"
    environment:
      NODE_ENV: "production"
      PORT: "8001"
      MUSICHOARDER_API_URL: "http://api:8080"
      PUBLIC_UMAMI_SRC: "${PUBLIC_UMAMI_SRC}"
      PUBLIC_UMAMI_WEBSITE_ID: "${PUBLIC_UMAMI_WEBSITE_ID}"
      PUBLIC_UMAMI_RECORDER_SRC: "${PUBLIC_UMAMI_RECORDER_SRC}"
      HOST: "0.0.0.0"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:8001"
    networks:
      - "aspire"
    restart: "always"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS http://localhost:8001/api/health || exit 1"
      interval: "10s"
      timeout: "5s"
      retries: 6
      start_period: "20s"
  spotiflac:
    image: "ghcr.io/jeffreyyvdb/musichoarder/spotiflac:${SPOTIFLAC_VERSION:-latest}"
    pull_policy: "always"
    environment:
      SPOTIFLAC_TIDAL_CUSTOM_API: "${SPOTIFLAC_TIDAL_CUSTOM_API:-}"
      SPOTIFLAC_QOBUZ_LOCAL_API_URL: "${SPOTIFLAC_QOBUZ_LOCAL_API_URL:-}"
    volumes:
      - type: "volume"
        target: "/data/downloads"
        source: "musichoarder-downloads"
    networks:
      - "aspire"
    restart: "always"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: "30s"
      timeout: "10s"
      retries: 3
      start_period: "20s"
    profiles:
      - "spotiflac"
networks:
  aspire:
    driver: "bridge"
volumes:
  postgres-data:
    driver: "local"
  musichoarder-dpkeys:
    driver: "local"
  musichoarder-downloads:
    driver: "local"
  musichoarder-synced-source:
    driver: "local"
