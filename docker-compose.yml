# MusicHoarder — self-hosting stack.
#
# This file PULLS prebuilt images from GHCR (ghcr.io/jeffreyyvdb/musichoarder/{api,frontend}),
# so you don't need a repo checkout or any build toolchain:
#
#   1. download this file + .env.example   2. cp .env.example .env and fill it in   3. docker compose up -d
#
# Pin a release by setting MUSICHOARDER_VERSION in .env (defaults to :latest).
# Prefer to build from source? Add the build override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
# Full guide: docs/SELF_HOSTING.md
services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: musichoarder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: musichoarderdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musichoarder -d musichoarderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  musichoarder:
    image: ghcr.io/jeffreyyvdb/musichoarder/api:${MUSICHOARDER_VERSION:-latest}
    restart: always
    ports:
      - "5050:8080"
    volumes:
      - ${MUSIC_SOURCE_PATH}:/music/source:ro
      - ${MUSIC_DESTINATION_PATH}:/music/destination
      # Writable staging dir for wishlist downloads (the source mount is read-only). The scanner
      # indexes it as an extra source root, so downloads flow through the normal pipeline.
      - musichoarder-downloads:/data/downloads
      # Persist DataProtection keys across container restarts so existing session cookies stay
      # valid. Without this, every redeploy logs everyone out.
      - musichoarder-dpkeys:/data/dpkeys
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__musichoarderdb=Host=postgres;Database=musichoarderdb;Username=musichoarder;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - MusicEnricher__SourceDirectory=/music/source
      - MusicEnricher__DestinationDirectory=/music/destination
      # Wishlist downloader (yt-dlp + ffmpeg are baked into the API image). Off by default; the owner
      # opts in via the Dokploy env. EnableWishlistDownloads gates the feature + the manual trigger;
      # AutoDownloadWishlist additionally lets the worker auto-fetch the owner's Pending items in the
      # background. The feature is owner-only (RequireOwner + owner-scoped workers).
      - MusicEnricher__EnableWishlistDownloads=${ENABLE_WISHLIST_DOWNLOADS:-false}
      - MusicEnricher__AutoDownloadWishlist=${AUTO_DOWNLOAD_WISHLIST:-false}
      - MusicEnricher__DownloadDirectory=/data/downloads
      - MusicEnricher__AcoustIdApiKey=${ACOUSTID_API_KEY:-}
      - Spotify__ClientId=${SPOTIFY_CLIENT_ID:-}
      - Spotify__ClientSecret=${SPOTIFY_CLIENT_SECRET:-}
      # Spotify redirects the browser back through the public frontend origin (the
      # /api/spotify/callback SvelteKit route forwards to the API). Without this the redirect URI
      # is derived from the proxied request host and resolves to a loopback address. Register
      # <PUBLIC_BASE_URL>/api/spotify/callback in the Spotify dashboard.
      - Spotify__OAuthRedirectBaseUrl=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      - Auth__OwnerEmail=${OWNER_EMAIL:?OWNER_EMAIL is required}
      - Auth__DemoUserEmail=${DEMO_USER_EMAIL:-demo@musichoarder.local}
      - Auth__DataProtectionKeysPath=/data/dpkeys
      - Resend__ApiKey=${RESEND_API_KEY:-}
      - Resend__FromAddress=${RESEND_FROM_ADDRESS:-noreply@musichoarder.local}
      - Frontend__PublicBaseUrl=${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      # AI quality grading (OpenAI-compatible; OpenRouter by default). Key blank → grading is a no-op.
      - QualityGrading__ApiKey=${QUALITY_GRADING_API_KEY:-}
      - QualityGrading__Model=${QUALITY_GRADING_MODEL:-deepseek/deepseek-v4-flash}
      - QualityGrading__BaseUrl=${QUALITY_GRADING_BASE_URL:-https://openrouter.ai/api/v1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/jeffreyyvdb/musichoarder/frontend:${MUSICHOARDER_VERSION:-latest}
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MUSICHOARDER_API_URL=http://musichoarder:8080
      # Umami analytics, loaded directly from the Umami host (script downloads from and posts
      # events to PUBLIC_UMAMI_SRC's origin). Read at runtime via $env/dynamic/public, so changing
      # these is an env change, no rebuild. Set PUBLIC_UMAMI_SRC to https://<umami-host>/script.js.
      - PUBLIC_UMAMI_SRC=${PUBLIC_UMAMI_SRC:-}
      - PUBLIC_UMAMI_WEBSITE_ID=${PUBLIC_UMAMI_WEBSITE_ID:-}
      - PUBLIC_UMAMI_RECORDER_SRC=${PUBLIC_UMAMI_RECORDER_SRC:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      musichoarder:
        condition: service_healthy

volumes:
  postgres-data:
  musichoarder-dpkeys:
  musichoarder-downloads:
