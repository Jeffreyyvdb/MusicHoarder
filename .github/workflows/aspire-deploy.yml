# Build the API + frontend images on a native amd64 runner via `aspire do push`
# (the Aspire pipeline reads MusicHoarder.AppHost and pushes
#   ghcr.io/<owner>/musichoarder/api  and  ghcr.io/<owner>/musichoarder/frontend  as :latest),
# then optionally trigger a Dokploy Compose redeploy that re-pulls them.
#
# Tagging: every build publishes :latest. When invoked with a `version` input (the Release
# workflow passes the semantic-release version), the images are additionally tagged :X.Y.Z, :X.Y
# and :X (standard container semver), reusing the just-built :latest manifest — no rebuild.
#
# Trigger model: this runs only on `workflow_dispatch`. The Release workflow (release.yml)
# dispatches it with the new `version` after semantic-release cuts a `vX.Y.Z` tag, so images
# build + deploy on releases only. It can also be run manually (no version) to rebuild :latest.
#
# Why this exists: building these linux/amd64 images locally on an Apple Silicon Mac runs the
# frontend's Vite build under x86 emulation and is painfully slow. GitHub's ubuntu runners are
# native amd64, so the build is fast here and never touches a developer machine.
name: Build & push (Aspire) → Dokploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to tag the images with (e.g. 1.9.2). Leave blank to only publish :latest."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  push:
    name: aspire do push → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The API image's base (set via <ContainerBaseImage>) bundles fpcalc + curl, which the .NET
      # SDK container target can't apt-install. Build + push it before `aspire do push` pulls it.
      # Plain `docker build` (not buildx) keeps the default builder so Aspire's build+tag flow works.
      - name: Build & push API base image
        run: |
          IMG=ghcr.io/jeffreyyvdb/musichoarder/api-base:latest
          docker build -f Dockerfile.api-base -t "$IMG" .
          docker push "$IMG"

      # The AppHost models config as parameters; the pipeline resolves them before the push even
      # though none are baked into the images (they're runtime ${...} placeholders in the compose,
      # filled in Dokploy). Supply throwaway values so --non-interactive never prompts.
      - name: aspire do push
        env:
          # Bake the release semver into the API assembly (MSBuild reads $(MH_VERSION) — see
          # MusicHoarder.Api.csproj). Blank on manual :latest-only rebuilds → SDK default 1.0.0.
          MH_VERSION: ${{ inputs.version }}
          Parameters__source-directory: /music/source
          Parameters__destination-directory: /music/destination
          Parameters__acoustid-api-key: ""
          Parameters__spotify-client-id: ""
          Parameters__spotify-client-secret: ""
          # Relay URL is derived from frontend-public-base-url in publish mode; the signing key + allowlist are
          # runtime ${...} placeholders filled in Dokploy. Throwaway values here just keep --non-interactive quiet.
          Parameters__spotify-oauth-relay-url: ""
          Parameters__spotify-oauth-state-key: ""
          Parameters__spotify-return-origin-allowlist: ""
          Parameters__frontend-public-base-url: "https://musichoarder-compose.jeffreyyvdb.com"
          Parameters__owner-email: "owner@example.com"
          Parameters__demo-user-email: "demo@example.com"
          Parameters__resend-api-key: ""
          Parameters__resend-from-address: "noreply@example.com"
        run: aspire do push --non-interactive

      # When a version is supplied, add semver tags pointing at the just-pushed :latest manifest (no rebuild).
      - name: Tag semver
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="${VERSION#v}"           # tolerate a leading v: v1.4.2 -> 1.4.2
          major="${version%%.*}"           # 1
          minor="${version%.*}"            # 1.4
          for name in api frontend; do
            img="ghcr.io/${owner}/musichoarder/${name}"
            docker buildx imagetools create \
              -t "${img}:${version}" \
              -t "${img}:${minor}" \
              -t "${img}:${major}" \
              "${img}:latest"
            echo "Tagged ${img} -> ${version}, ${minor}, ${major}"
          done

  deploy:
    name: Redeploy Dokploy
    needs: push
    runs-on: ubuntu-latest
    steps:
      # GHCR doesn't fire push webhooks, so we trigger the redeploy ourselves — here, AFTER the new
      # :latest is in GHCR, so the deploy always pulls the freshly built images (avoids the one-
      # release lag you get from Dokploy's own on-push auto-deploy, which fires before the build).
      #
      # Dokploy exposes a per-service webhook deploy URL (service → Deployments → Webhook URL) that
      # triggers the same `docker stack deploy`. Store the FULL URL — it embeds a secret token — as
      # the DOKPLOY_DEPLOY_WEBHOOK_URL repo secret. Skips cleanly when unset.
      #
      # IMPORTANT: the webhook only fires when "Auto Deploy" is ENABLED on the compose
      # (service → Deployments → Auto Deploy). With it off, the webhook returns
      # `400 {"message":"Automatic deployments are disabled for this compose"}`. There's no
      # double-deploy risk from enabling it: GHCR doesn't send registry push webhooks (see above),
      # so this Action is the only thing that ever hits the URL.
      #
      # The webhook is Dokploy's *git-push* endpoint: it extracts the branch from a GitHub-style
      # push payload and deploys only if it matches the compose's configured branch. A bare POST
      # sends no branch, so Dokploy returns `301 {"message":"Branch Not Match"}`. We therefore send
      # the `X-GitHub-Event: push` header + `{"ref":"refs/heads/<DEPLOY_BRANCH>", ...}`. DEPLOY_BRANCH
      # must equal the branch configured on the compose in Dokploy (main for prod).
      - name: Trigger Dokploy redeploy (webhook)
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}
          DEPLOY_BRANCH: main
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_URL:-}" ]; then
            echo "::notice::DOKPLOY_DEPLOY_WEBHOOK_URL not set — skipping redeploy (images were still pushed)."
            exit 0
          fi
          # No -f and a trailing `|| true` so a 4xx/5xx still prints the body instead of dying with a
          # bare "exit 22" that hides the cause. The GitHub-style payload satisfies Dokploy's branch check.
          status=$(curl -sS --max-time 60 -o /tmp/deploy.out -w "%{http_code}" -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "{\"ref\":\"refs/heads/${DEPLOY_BRANCH}\",\"repository\":{\"full_name\":\"${REPO}\"}}" || true)
          echo "HTTP ${status}"
          echo "Response:"; cat /tmp/deploy.out 2>/dev/null || echo "(none)"; echo
          case "${status}" in
            2??) echo "Redeploy triggered." ;;
            301) echo "::error::Dokploy rejected the redeploy (HTTP 301 \"Branch Not Match\"). The branch we send (refs/heads/${DEPLOY_BRANCH}) must equal the branch configured on the compose (Dokploy → service → Provider → Branch). Update DEPLOY_BRANCH here or the branch in Dokploy so they agree."; exit 1 ;;
            400) echo "::error::Dokploy rejected the redeploy (HTTP 400). If the body says \"Automatic deployments are disabled for this compose\", enable Auto Deploy on the compose (Dokploy → service → Deployments → Auto Deploy) — the webhook requires it. This Action is the only caller, so there's no double-deploy risk."; exit 1 ;;
            *) echo "::error::Dokploy redeploy webhook failed (HTTP ${status}). Check DOKPLOY_DEPLOY_WEBHOOK_URL (Dokploy → service → Deployments → Webhook URL; rotate the token if it leaked) and that Auto Deploy is enabled on the compose."; exit 1 ;;
          esac
