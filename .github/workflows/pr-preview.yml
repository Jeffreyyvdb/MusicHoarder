# Per-PR preview environments on Dokploy.
#
# Dokploy's built-in Preview Deployments don't support Docker Compose apps
# (https://github.com/Dokploy/dokploy/issues/2028), and MusicHoarder is a 3-service compose stack,
# so we provision our own: build pr-<n> images, then spin up an *isolated* full compose stack
# (postgres + api + frontend) on Dokploy reachable at https://pr-<n>.<PREVIEW_BASE_DOMAIN>.
# Torn down when the PR closes. See scripts/dokploy-preview.sh and the README.
#
# SECURITY: previews run only for PRs from branches in this repo. Fork PRs are skipped — this is a
# public repo and we never build/run untrusted contributor code on the server (Dokploy gives the
# same warning for its native feature). The internal-branch guard is on every job.
#
# Production is untouched: these images are plain `docker build` of the repo Dockerfiles tagged
# :pr-<n>; the Aspire :latest flow in aspire-deploy.yml is independent.
name: PR preview (Dokploy)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to provision a preview for (phase-1 manual validation)"
        required: true
        type: string

# One run per PR; a new push cancels an in-flight build for the same PR.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/musichoarder

jobs:
  build-and-deploy:
    name: Build images + deploy preview
    runs-on: ubuntu-latest
    # Skip on PR close (that's the teardown job). Run for manual dispatch, or for non-close PR
    # events whose head branch lives in THIS repo (not a fork). workflow_dispatch is an unguarded
    # escape hatch by design — only users with write access can trigger it, so a maintainer
    # manually previewing a fork PR is a trusted action.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action != 'closed' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      # Are the Dokploy preview secrets configured? Until the one-time setup is done (DNS +
      # previews environment + secrets, see README), skip the whole job with a notice instead of
      # red-X-ing every PR. Secrets can't be used in `if:` directly, so gate via this output.
      - name: Preflight — preview configured?
        id: pre
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_PREVIEW_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_PREVIEW_ENVIRONMENT_ID }}
          PREVIEW_BASE_DOMAIN: ${{ secrets.PREVIEW_BASE_DOMAIN }}
        run: |
          if [ -n "$DOKPLOY_URL" ] && [ -n "$DOKPLOY_API_KEY" ] \
             && [ -n "$DOKPLOY_PREVIEW_ENVIRONMENT_ID" ] && [ -n "$PREVIEW_BASE_DOMAIN" ]; then
            echo "configured=true" >>"$GITHUB_OUTPUT"
          else
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Dokploy preview secrets not set — skipping preview build/deploy. See README 'PR preview environments'."
          fi

      - name: Resolve PR number + lowercase image base
        id: vars
        if: steps.pre.outputs.configured == 'true'
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "pr=${pr}" >>"$GITHUB_OUTPUT"
          base="${IMAGE_BASE,,}"   # GHCR requires a lowercase path
          echo "api_image=${base}/api:pr-${pr}" >>"$GITHUB_OUTPUT"
          echo "frontend_image=${base}/frontend:pr-${pr}" >>"$GITHUB_OUTPUT"

      # For pull_request this checks out the merge ref; for workflow_dispatch grab the PR head.
      - uses: actions/checkout@v6.0.3
        if: steps.pre.outputs.configured == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', steps.vars.outputs.pr) }}

      - name: Log in to GHCR
        if: steps.pre.outputs.configured == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.pre.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v4

      # Same Dockerfiles production uses — context `.` for the API (it bundles fpcalc + curl) and
      # ./frontend for the SvelteKit/Bun server. Built via buildx with a GitHub Actions layer cache
      # (separate scope per image so they don't evict each other) so repeated PR pushes reuse the
      # expensive `dotnet restore` / `bun install` stages. provenance:false keeps a plain single-image
      # manifest (matching the old `docker build`) so the :pr-<n> tag shape teardown prunes is intact.
      - name: Build & push API image
        if: steps.pre.outputs.configured == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.api_image }}
          cache-from: type=gha,scope=pr-api
          cache-to: type=gha,mode=max,scope=pr-api
          provenance: false

      - name: Build & push frontend image
        if: steps.pre.outputs.configured == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.frontend_image }}
          cache-from: type=gha,scope=pr-frontend
          cache-to: type=gha,mode=max,scope=pr-frontend
          provenance: false

      - name: Provision Dokploy preview stack
        id: provision
        if: steps.pre.outputs.configured == 'true'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_PREVIEW_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_PREVIEW_ENVIRONMENT_ID }}
          PREVIEW_BASE_DOMAIN: ${{ secrets.PREVIEW_BASE_DOMAIN }}
          PREVIEW_POSTGRES_PASSWORD: ${{ secrets.PREVIEW_POSTGRES_PASSWORD }}
          PREVIEW_OWNER_EMAIL: ${{ secrets.PREVIEW_OWNER_EMAIL }}
          # Owner's pre-registered passkey, seeded into the empty preview DB so passkey login works
          # without re-registering. Public-key material only; empty → seed skipped.
          PREVIEW_OWNER_SEED_CREDENTIAL: ${{ secrets.PREVIEW_OWNER_SEED_CREDENTIAL }}
          # Spotify OAuth: the preview completes the token exchange itself, so it needs the app creds and the
          # shared state-signing key (must equal the prod relay's). The relay URL is the single registered URI.
          # All empty → Spotify connect simply stays disabled in the preview.
          PREVIEW_SPOTIFY_CLIENT_ID: ${{ secrets.PREVIEW_SPOTIFY_CLIENT_ID }}
          PREVIEW_SPOTIFY_CLIENT_SECRET: ${{ secrets.PREVIEW_SPOTIFY_CLIENT_SECRET }}
          PREVIEW_SPOTIFY_OAUTH_RELAY_URL: ${{ vars.PREVIEW_SPOTIFY_OAUTH_RELAY_URL }}
          PREVIEW_SPOTIFY_OAUTH_STATE_KEY: ${{ secrets.PREVIEW_SPOTIFY_OAUTH_STATE_KEY }}
          # Optional raw yt-dlp flags to dodge YouTube's datacenter-IP bot check (repo variable),
          # e.g. "--extractor-args youtube:player_client=tv". Empty → plain yt-dlp.
          PREVIEW_YTDLP_EXTRA_ARGS: ${{ vars.PREVIEW_YTDLP_EXTRA_ARGS }}
          # AI quality grading. Key empty → grading stays a no-op in the preview. Model/base URL
          # default in the script (deepseek/deepseek-v4-flash on OpenRouter); override via repo vars.
          PREVIEW_QUALITY_GRADING_API_KEY: ${{ secrets.PREVIEW_QUALITY_GRADING_API_KEY }}
          PREVIEW_QUALITY_GRADING_MODEL: ${{ vars.PREVIEW_QUALITY_GRADING_MODEL }}
          PREVIEW_QUALITY_GRADING_BASE_URL: ${{ vars.PREVIEW_QUALITY_GRADING_BASE_URL }}
          # Host path of the shared read-only sample library (repo variable). Empty → script default
          # applies. The per-PR destination is a managed named volume, not a host path.
          PREVIEW_SOURCE_DIR: ${{ vars.PREVIEW_SOURCE_DIR }}
          PR: ${{ steps.vars.outputs.pr }}
          API_IMAGE: ${{ steps.vars.outputs.api_image }}
          FRONTEND_IMAGE: ${{ steps.vars.outputs.frontend_image }}
        run: ./scripts/dokploy-preview.sh provision

      - name: Comment preview URL + label PR
        if: github.event_name == 'pull_request' && steps.provision.outputs.preview_url != ''
        uses: actions/github-script@v9
        env:
          # Full head SHA of what was just built+deployed. The comment shows the short form so a
          # glance tells you whether the live preview matches the latest push.
          DEPLOYED_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            // toJSON keeps this a valid JS string literal even if the URL ever contains a quote.
            const url = ${{ toJSON(steps.provision.outputs.preview_url) }};
            const sha = (process.env.DEPLOYED_SHA || "").slice(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${process.env.DEPLOYED_SHA}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const updated = new Date().toISOString().replace("T", " ").replace(/\.\d+Z$/, " UTC");
            const marker = "<!-- mh-preview -->";
            const body = `${marker}\n🟢 **Preview environment live**\n\n${url}\n\n` +
              `**Deployed commit:** [\`${sha}\`](${commitUrl}) · updated ${updated} · [deploy log](${runUrl})\n\n` +
              `⏳ The stack takes ~1 min to come up — give it a moment if the link 502s at first.\n\n` +
              `Full isolated stack (Postgres + API + frontend). Sign in with the magic link from ` +
              `the API logs in Dokploy. Auto-redeploys on every push; torn down when this PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

            // PR-list-visible signal: a green "preview" label means a live env exists for this PR.
            // Ensure the label exists (idempotent — 422 if already created), then attach it.
            const label = "preview";
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: label, color: "0e8a16",
                description: "Has a live Dokploy preview environment",
              });
            } catch (e) {
              if (e.status !== 422) throw e; // 422 = label already exists
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: [label],
            });

  teardown:
    name: Tear down preview
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Teardown only deletes by composeId, so it needs the API creds + environment id but NOT
      # PREVIEW_BASE_DOMAIN (which the deploy preflight checks) — hence the shorter list here.
      - name: Preflight — preview configured?
        id: pre
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_PREVIEW_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_PREVIEW_ENVIRONMENT_ID }}
        run: |
          if [ -n "$DOKPLOY_URL" ] && [ -n "$DOKPLOY_API_KEY" ] && [ -n "$DOKPLOY_PREVIEW_ENVIRONMENT_ID" ]; then
            echo "configured=true" >>"$GITHUB_OUTPUT"
          else
            echo "configured=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Dokploy preview secrets not set — nothing to tear down."
          fi

      - uses: actions/checkout@v6.0.3
        if: steps.pre.outputs.configured == 'true'

      - name: Destroy Dokploy preview stack
        if: steps.pre.outputs.configured == 'true'
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_PREVIEW_ENVIRONMENT_ID: ${{ secrets.DOKPLOY_PREVIEW_ENVIRONMENT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: ./scripts/dokploy-preview.sh destroy

      # Best-effort: drop the pr-<n> image versions so they don't accumulate in GHCR. Needs a token
      # with delete:packages; the default GITHUB_TOKEN can delete versions of packages owned by this
      # repo's owner. Never fails the job.
      - name: Prune pr-<n> GHCR image versions
        if: steps.pre.outputs.configured == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN || secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # No `-e`: every fallible call below is guarded with `|| ...`, and the whole step is
          # continue-on-error, so pruning is strictly best-effort and never blocks teardown.
          set -uo pipefail
          for pkg in musichoarder/api musichoarder/frontend; do
            enc=$(jq -rn --arg p "$pkg" '$p|@uri')
            # user-owned packages live under /users/<owner>/...; orgs under /orgs/<owner>/...
            base="/users/${OWNER}/packages/container/${enc}/versions"
            ids=$(gh api --paginate "$base" 2>/dev/null \
              | jq -r --arg t "pr-${PR}" '.[] | select(.metadata.container.tags | index($t)) | .id' || true)
            for id in $ids; do
              echo "Deleting ${pkg} version ${id} (tag pr-${PR})"
              gh api -X DELETE "${base}/${id}" || echo "::notice::could not delete ${pkg} version ${id}"
            done
          done

      - name: Comment teardown + unlabel PR
        if: steps.pre.outputs.configured == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- mh-preview -->";
            const body = `${marker}\n🧹 Preview environment for this PR has been torn down.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

            // Drop the "preview" label so the PR list no longer shows it as live. Ignore 404
            // (label was never attached, or already removed).
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, name: "preview",
              });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
