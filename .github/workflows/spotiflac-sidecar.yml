# Builds and pushes the optional streaming-FLAC acquisition sidecar image to GHCR
# (ghcr.io/jeffreyyvdb/musichoarder/spotiflac). Self-hosters pull it via the profile-gated
# `spotiflac` service in docker-compose.yml (COMPOSE_PROFILES=spotiflac) — no checkout/build needed.
#
# The sidecar versions independently of the app's semver line (it's not part of the Aspire deploy):
#   - push to main touching sidecars/spotiflac/** → refresh :latest
#   - a published GitHub Release → also tag the release version (so SPOTIFLAC_VERSION can pin it)
name: spotiflac sidecar image

on:
  push:
    branches: [main]
    paths:
      - "sidecars/spotiflac/**"
      - ".github/workflows/spotiflac-sidecar.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          img="ghcr.io/jeffreyyvdb/musichoarder/spotiflac"
          tags="${img}:latest"
          if [ "${{ github.event_name }}" = "release" ]; then
            tags="${tags},${img}:${{ github.event.release.tag_name }}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./sidecars/spotiflac
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
