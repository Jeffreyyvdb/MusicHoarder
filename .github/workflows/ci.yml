# Restore, build, and test the .NET solution and the SvelteKit frontend.
# No deploy or container publishing — that's docker-publish.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-drift:
    # Fails if the committed Aspire-generated prod compose is missing any env key the AppHost
    # declares, or if the self-host compose is missing a provider/feature key — the failure mode
    # that shipped AI lyrics transcription invisible in prod. Pure bash, no toolchain needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Check Aspire compose drift
        run: bash scripts/check-aspire-compose-drift.sh

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MusicHoarder.Api.Tests/MusicHoarder.Api.Tests.csproj

      - name: Build
        run: dotnet build MusicHoarder.Api.Tests/MusicHoarder.Api.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test MusicHoarder.Api.Tests/MusicHoarder.Api.Tests.csproj --no-build -c Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run lint
      - run: bun run check
      - run: bun run test
