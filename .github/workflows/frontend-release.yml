name: Frontend release

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-release.yml'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: frontend-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # semantic-release v25+ requires Node ^22.14.0 || >=24.10.0. Bun's
      # runtime reports process.versions.node = 20.x, so the release step
      # runs under Node via `npx semantic-release` below — `bunx` would fail
      # the engines check. All other steps stay on Bun.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run lint
      - run: bun run build
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
